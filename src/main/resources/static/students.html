<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/page-styles.css">
</head>
<body>
<header>
    <h1>Student Management</h1>
</header>

<div class="nav-left">
    <a href="/index.html" class="btn">Back to Home</a>
</div>

<div class="container">

    <div class="card">
        <h3>Search Students</h3>
        <input type="text" id="searchName" placeholder="Search by name">
        <button onclick="loadStudents()" class="btn">Search / Show All</button>
    </div>

    <div class="card">
        <h3>Add / Edit Student</h3>

        <input type="hidden" id="studentId">

        <input type="text" id="name" placeholder="Name"><br><br>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="text" id="course" placeholder="Course"><br><br>

        <button onclick="addStudent()" class="btn">Save</button>
        <button onclick="clearForm()" class="btn">Clear</button>
    </div>

    <div class="card">
        <h3>Students List</h3>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

</div>
<script src="/students.js"></script>
</body>
</html>
