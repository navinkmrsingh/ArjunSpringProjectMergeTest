<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/page-styles.css">
</head>

<body>
<header>
  <h1><i class="fas fa-user-shield"></i> Admin Management</h1>
</header>

<div class="container">
  <!-- Toast Notifications -->
  <div id="toastContainer"></div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <a href="/index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h2>Manage Admins</h2>
    <div style="width: 150px;"></div>
  </div>

  <div class="custom-card">
    <h4 class="mb-3"><i class="fas fa-search"></i> Search Admins</h4>
    <div class="row">
      <div class="col-md-6">
        <div class="input-group">
          <input type="text" id="searchName" class="form-control" placeholder="Search by name...">
          <button onclick="loadAdmins()" class="btn btn-outline-success"><i class="fas fa-search"></i> Search / Show
            All</button>
        </div>
      </div>
    </div>
  </div>

  <div class="custom-card">
    <h4 class="mb-3"><i class="fas fa-user-plus"></i> Add / Edit Admin</h4>

    <input type="hidden" id="adminId">

    <div class="row mb-3">
      <div class="col-md-4">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" class="form-control" placeholder="Name">
      </div>
      <div class="col-md-4">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Email">
      </div>
      <div class="col-md-4">
        <label for="department" class="form-label">Department</label>
        <input type="text" id="department" class="form-control" placeholder="Department">
      </div>
    </div>

    <button onclick="saveAdmin()" class="btn btn-success"><i class="fas fa-save"></i> Save</button>
    <button onclick="clearForm()" class="btn btn-secondary"><i class="fas fa-eraser"></i> Clear</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped align-middle">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody id="adminTable"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin.js"></script>
</body>

</html>
